<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ComfyUI 实时日志</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #1a1a1a;
        color: #fff;
        font-family: Consolas, 'Courier New', monospace;
        font-size: 12px;
        padding: 10px;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }
      .toolbar {
        display: flex;
        gap: 10px;
        margin-bottom: 10px;
        padding-bottom: 10px;
        border-bottom: 1px solid #333;
        flex-wrap: wrap;
      }
      .btn {
        padding: 6px 12px;
        border: none;
        border-radius: 4px;
        background: #6366f1;
        color: #fff;
        cursor: pointer;
        font-size: 12px;
        transition: background 0.3s;
      }
      .btn:hover {
        background: #4f46e5;
      }
      .btn-secondary {
        background: #4b5563;
      }
      .btn-secondary:hover {
        background: #374151;
      }
      .log-container {
        flex: 1;
        overflow-y: auto;
        white-space: pre-wrap;
        line-height: 1.5;
        background: #0f0f0f;
        padding: 10px;
        border-radius: 4px;
        font-size: 11px;
      }
      .log-container::-webkit-scrollbar {
        width: 8px;
      }
      .log-container::-webkit-scrollbar-track {
        background: #1a1a1a;
      }
      .log-container::-webkit-scrollbar-thumb {
        background: #333;
        border-radius: 4px;
      }
      .log-line {
        min-height: 1.5em;
      }
      .log-error {
        color: #ef4444;
      }
      .log-warn {
        color: #f59e0b;
      }
      .log-info {
        color: #60a5fa;
      }
      .status-bar {
        margin-top: 10px;
        color: #9ca3af;
        font-size: 11px;
        display: flex;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 10px;
      }
      .status-item {
        display: flex;
        align-items: center;
        gap: 5px;
      }
      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #6b7280;
      }
      .status-dot.running {
        background: #22c55e;
      }
      .status-dot.stopped {
        background: #6b7280;
      }
      .status-dot.starting {
        background: #f59e0b;
        animation: pulse 1s infinite;
      }
      .status-dot.failed {
        background: #ef4444;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }
      .auto-scroll {
        display: flex;
        align-items: center;
        gap: 5px;
        cursor: pointer;
      }
      .auto-scroll input {
        accent-color: #6366f1;
      }
    </style>
  </head>
  <body>
    <div class="toolbar">
      <button class="btn" onclick="refreshLog()">刷新日志</button>
      <button class="btn btn-secondary" onclick="clearLog()">清空日志</button>
      <button class="btn btn-secondary" onclick="saveLog()">保存日志</button>
      <button class="btn btn-secondary" onclick="window.close()">关闭</button>
      <label class="auto-scroll">
        <input type="checkbox" id="autoScroll" checked />
        自动滚动
      </label>
    </div>
    <div class="log-container" id="log-content"></div>
    <div class="status-bar">
      <div class="status-item">
        <div class="status-dot" id="status-dot"></div>
        <span id="status-text">状态：加载中...</span>
      </div>
      <div class="status-item">
        <span>端口：<span id="port-text">-</span></span>
      </div>
      <div class="status-item">
        <span>PID：<span id="pid-text">-</span></span>
      </div>
      <div class="status-item">
        <span>最后更新：<span id="update-time">-</span></span>
      </div>
    </div>

    <script>
      const logContent = document.getElementById('log-content');
      const statusDot = document.getElementById('status-dot');
      const statusText = document.getElementById('status-text');
      const portText = document.getElementById('port-text');
      const pidText = document.getElementById('pid-text');
      const updateTime = document.getElementById('update-time');
      const autoScrollCheckbox = document.getElementById('autoScroll');

      const MAX_LINES = 2000;
      const TRIM_BATCH = 200;

      // 中文级别映射
      const LEVEL_TEXT = {
        error: '错误',
        warn: '警告',
        info: '信息'
      };

      // HTML 转义
      function escapeHtml(text) {
        return text
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;');
      }

      // 解析单行日志 → { timestamp, level, message }
      function parseLine(line) {
        // 格式: [HH:MM:SS] [level] message
        const match = line.match(/^\[(\d{2}:\d{2}:\d{2})\] \[(error|warn|info)\] (.*)$/);
        if (match) {
          return { timestamp: match[1], level: match[2], message: match[3] };
        }
        // 兜底：只有时间戳
        const simpleMatch = line.match(/^\[(\d{2}:\d{2}:\d{2})\] (.*)$/);
        if (simpleMatch) {
          return { timestamp: simpleMatch[1], level: 'info', message: simpleMatch[2] };
        }
        // 无时间戳
        return { timestamp: '', level: 'info', message: line };
      }

      // 创建一行 DOM 元素
      function createLogLineElement(entry) {
        const div = document.createElement('div');
        div.className = 'log-line log-' + entry.level;
        const levelText = LEVEL_TEXT[entry.level] || '信息';
        div.textContent = '[' + entry.timestamp + '] [' + levelText + '] ' + entry.message;
        return div;
      }

      // 批量追加日志（使用 DocumentFragment，避免逐行重排）
      function appendLogBatch(text) {
        const lines = text.split('\n').filter(l => l.trim());
        if (lines.length === 0) return;

        const fragment = document.createDocumentFragment();
        for (const line of lines) {
          const entry = parseLine(line);
          fragment.appendChild(createLogLineElement(entry));
        }
        logContent.appendChild(fragment);

        // 超过最大行数时，移除旧行
        trimOldLines();
        scrollToBottom();
      }

      // 追加单条 IPC 日志数据
      function appendLog(data) {
        appendLogBatch(data);
      }

      // 限制行数
      function trimOldLines() {
        const excess = logContent.childElementCount - MAX_LINES;
        if (excess <= 0) return;
        const removeCount = Math.min(excess + TRIM_BATCH, logContent.childElementCount);
        const fragment = document.createDocumentFragment();
        for (let i = 0; i < removeCount; i++) {
          const child = logContent.firstChild;
          if (child) fragment.appendChild(child);
        }
      }

      // 初始化
      window.addEventListener('DOMContentLoaded', async () => {
        if (window.comfyuiDesktop && window.comfyuiDesktop.getSessionLog) {
          try {
            const sessionLogCache = await window.comfyuiDesktop.getSessionLog();
            if (sessionLogCache) {
              appendLogBatch(sessionLogCache);
            } else {
              appendPlaceholder();
            }
          } catch {
            appendPlaceholder();
          }
        } else {
          appendPlaceholder();
        }

        if (window.electronAPI) {
          window.electronAPI.on('logUpdate', (_, data) => {
            appendLog(data);
            updateTimestamp();
          });

          window.electronAPI.on('statusUpdate', (_, data) => {
            updateStatus(data);
          });
        }
      });

      function appendPlaceholder() {
        const div = document.createElement('div');
        div.className = 'log-line log-info';
        div.textContent = '日志窗口已打开，等待新日志...';
        logContent.appendChild(div);
      }

      // 刷新日志
      async function refreshLog() {
        try {
          const content = await window.comfyuiDesktop.getLogContent();
          logContent.innerHTML = '';
          appendLogBatch(content);
          updateTimestamp();
        } catch (err) {
          logContent.textContent = '加载日志失败：' + err.message;
        }
      }

      // 清空日志
      async function clearLog() {
        const result = await window.comfyuiDesktop.clearLog();
        if (result) {
          logContent.innerHTML = '';
          const div = document.createElement('div');
          div.className = 'log-line log-info';
          div.textContent = '日志已清空';
          logContent.appendChild(div);
          updateTimestamp();
        }
      }

      // 保存日志
      function saveLog() {
        const content = logContent.innerText;
        const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'comfyui-log-' + new Date().toISOString().slice(0, 10) + '.log';
        a.click();
        URL.revokeObjectURL(url);
      }

      // 更新状态
      function updateStatus(data) {
        const statusMap = {
          stopped: '已停止',
          starting: '启动中',
          running: '运行中',
          failed: '启动失败',
          restarting: '重启中',
          stopping: '停止中'
        };

        statusText.textContent = '状态：' + (statusMap[data.status] || data.status);
        statusDot.className = 'status-dot ' + data.status;
        portText.textContent = data.port || '-';
        pidText.textContent = data.pid || '-';
        updateTimestamp();
      }

      function updateTimestamp() {
        updateTime.textContent = new Date().toLocaleTimeString();
      }

      function scrollToBottom() {
        if (autoScrollCheckbox.checked) {
          logContent.scrollTop = logContent.scrollHeight;
        }
      }

      logContent.addEventListener('scroll', () => {
        // 用户手动滚动时不自动取消勾选
      });
    </script>
  </body>
</html>
