<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ComfyUI 实时日志</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #1a1a1a;
        color: #fff;
        font-family: Consolas, 'Courier New', monospace;
        font-size: 12px;
        padding: 10px;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }
      .toolbar {
        display: flex;
        gap: 10px;
        margin-bottom: 10px;
        padding-bottom: 10px;
        border-bottom: 1px solid #333;
        flex-wrap: wrap;
      }
      .btn {
        padding: 6px 12px;
        border: none;
        border-radius: 4px;
        background: #6366f1;
        color: #fff;
        cursor: pointer;
        font-size: 12px;
        transition: background 0.3s;
      }
      .btn:hover {
        background: #4f46e5;
      }
      .btn-secondary {
        background: #4b5563;
      }
      .btn-secondary:hover {
        background: #374151;
      }
      .log-container {
        flex: 1;
        overflow-y: auto;
        white-space: pre-wrap;
        line-height: 1.5;
        background: #0f0f0f;
        padding: 10px;
        border-radius: 4px;
        font-size: 11px;
      }
      .log-container::-webkit-scrollbar {
        width: 8px;
      }
      .log-container::-webkit-scrollbar-track {
        background: #1a1a1a;
      }
      .log-container::-webkit-scrollbar-thumb {
        background: #333;
        border-radius: 4px;
      }
      .log-error {
        color: #ef4444;
      }
      .log-warn {
        color: #f59e0b;
      }
      .log-info {
        color: #60a5fa;
      }
      .log-debug {
        color: #9ca3af;
      }
      .status-bar {
        margin-top: 10px;
        color: #9ca3af;
        font-size: 11px;
        display: flex;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 10px;
      }
      .status-item {
        display: flex;
        align-items: center;
        gap: 5px;
      }
      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #6b7280;
      }
      .status-dot.running {
        background: #22c55e;
      }
      .status-dot.stopped {
        background: #6b7280;
      }
      .status-dot.starting {
        background: #f59e0b;
        animation: pulse 1s infinite;
      }
      .status-dot.failed {
        background: #ef4444;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }
      .auto-scroll {
        display: flex;
        align-items: center;
        gap: 5px;
        cursor: pointer;
      }
      .auto-scroll input {
        accent-color: #6366f1;
      }
    </style>
  </head>
  <body>
    <div class="toolbar">
      <button class="btn" onclick="refreshLog()">刷新日志</button>
      <button class="btn btn-secondary" onclick="clearLog()">清空日志</button>
      <button class="btn btn-secondary" onclick="saveLog()">保存日志</button>
      <button class="btn btn-secondary" onclick="window.close()">关闭</button>
      <label class="auto-scroll">
        <input type="checkbox" id="autoScroll" checked />
        自动滚动
      </label>
    </div>
    <div class="log-container" id="log-content">加载中...</div>
    <div class="status-bar">
      <div class="status-item">
        <div class="status-dot" id="status-dot"></div>
        <span id="status-text">状态：加载中...</span>
      </div>
      <div class="status-item">
        <span>端口：<span id="port-text">-</span></span>
      </div>
      <div class="status-item">
        <span>PID：<span id="pid-text">-</span></span>
      </div>
      <div class="status-item">
        <span>最后更新：<span id="update-time">-</span></span>
      </div>
    </div>

    <script>
      const logContent = document.getElementById('log-content');
      const statusDot = document.getElementById('status-dot');
      const statusText = document.getElementById('status-text');
      const portText = document.getElementById('port-text');
      const pidText = document.getElementById('pid-text');
      const updateTime = document.getElementById('update-time');
      const autoScrollCheckbox = document.getElementById('autoScroll');

      // 会话日志缓存 - 存储本次会话的所有日志
      let sessionLogCache = '';

      // 初始化 - 加载会话日志缓存
      window.addEventListener('DOMContentLoaded', async () => {
        // 从主进程获取会话日志缓存
        if (window.comfyuiDesktop && window.comfyuiDesktop.getSessionLog) {
          try {
            sessionLogCache = await window.comfyuiDesktop.getSessionLog();
            if (sessionLogCache) {
              logContent.innerHTML = formatLog(sessionLogCache);
              scrollToBottom();
            } else {
              logContent.innerHTML = '<span class="log-info">日志窗口已打开，等待新日志...</span><br>';
            }
          } catch (err) {
            logContent.innerHTML = '<span class="log-info">日志窗口已打开，等待新日志...</span><br>';
          }
        } else {
          logContent.innerHTML = '<span class="log-info">日志窗口已打开，等待新日志...</span><br>';
        }

        // 监听日志更新
        if (window.electronAPI) {
          window.electronAPI.on('logUpdate', (_, data) => {
            appendLog(data);
            updateTimestamp();
          });

          // 监听状态更新
          window.electronAPI.on('statusUpdate', (_, data) => {
            updateStatus(data);
          });
        }
      });

      // 刷新日志
      async function refreshLog() {
        try {
          const content = await window.comfyuiDesktop.getLogContent();
          logContent.innerHTML = formatLog(content);
          scrollToBottom();
          updateTimestamp();
        } catch (err) {
          logContent.textContent = '加载日志失败：' + err.message;
        }
      }

      // 追加日志
      function appendLog(data) {
        // 更新会话缓存
        sessionLogCache += data;
        logContent.innerHTML += formatLog(data);
        scrollToBottom();
      }

      // 格式化日志（按级别上色）
      function formatLog(content) {
        if (!content) return '';
        return content
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          // 匹配带时间戳和级别的日志
          .replace(/\[(\d{2}:\d{2}:\d{2})\] \[error\] (.*)/g, '<span class="log-error">[$1] [错误] $2</span>')
          .replace(/\[(\d{2}:\d{2}:\d{2})\] \[warn\] (.*)/g, '<span class="log-warn">[$1] [警告] $2</span>')
          .replace(/\[(\d{2}:\d{2}:\d{2})\] \[info\] (.*)/g, '<span class="log-info">[$1] [信息] $2</span>')
          .replace(/\[(\d{2}:\d{2}:\d{2})\] \[debug\] (.*)/g, '<span class="log-debug">[$1] [调试] $2</span>')
          // 匹配只有时间戳的日志（ComfyUI 原始输出）
          .replace(/\[(\d{2}:\d{2}:\d{2})\] ([^\[].*)/g, '<span class="log-info">[$1] [信息] $2</span>')
          .replace(/\n/g, '<br>');
      }

      // 清空日志
      async function clearLog() {
        const result = await window.comfyuiDesktop.clearLog();
        if (result) {
          logContent.innerHTML = '<span class="log-info">日志已清空</span><br>';
          updateTimestamp();
        }
      }

      // 保存日志
      function saveLog() {
        const content = logContent.innerText;
        const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `comfyui-log-${new Date().toISOString().slice(0, 10)}.log`;
        a.click();
        URL.revokeObjectURL(url);
      }

      // 更新状态
      function updateStatus(data) {
        const statusMap = {
          stopped: '已停止',
          starting: '启动中',
          running: '运行中',
          failed: '启动失败',
          restarting: '重启中',
          stopping: '停止中'
        };

        statusText.textContent = '状态：' + (statusMap[data.status] || data.status);
        statusDot.className = 'status-dot ' + data.status;
        portText.textContent = data.port || '-';
        pidText.textContent = data.pid || '-';
        updateTimestamp();
      }

      // 更新时间戳
      function updateTimestamp() {
        updateTime.textContent = new Date().toLocaleTimeString();
      }

      // 滚动到底部
      function scrollToBottom() {
        if (autoScrollCheckbox.checked) {
          logContent.scrollTop = logContent.scrollHeight;
        }
      }

      // 监听滚动，自动调整自动滚动状态
      logContent.addEventListener('scroll', () => {
        const isAtBottom = logContent.scrollTop + logContent.clientHeight >= logContent.scrollHeight - 20;
        if (!isAtBottom && autoScrollCheckbox.checked) {
          // 用户手动向上滚动时，不自动取消勾选，让用户自己控制
        }
      });
    </script>
  </body>
</html>
