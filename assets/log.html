<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ComfyUI 实时日志</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #1a1a1a;
        color: #fff;
        font-family: Consolas, 'Courier New', monospace;
        font-size: 12px;
        padding: 10px;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }
      .toolbar {
        display: flex;
        gap: 10px;
        margin-bottom: 10px;
        padding-bottom: 10px;
        border-bottom: 1px solid #333;
        flex-wrap: wrap;
      }
      .btn {
        padding: 6px 12px;
        border: none;
        border-radius: 4px;
        background: #6366f1;
        color: #fff;
        cursor: pointer;
        font-size: 12px;
        transition: background 0.3s;
      }
      .btn:hover {
        background: #4f46e5;
      }
      .btn-secondary {
        background: #4b5563;
      }
      .btn-secondary:hover {
        background: #374151;
      }
      .log-container {
        flex: 1;
        overflow-y: auto;
        white-space: pre-wrap;
        line-height: 1.5;
        background: #0f0f0f;
        padding: 10px;
        border-radius: 4px;
        font-size: 11px;
        contain: strict;
        will-change: scroll-position;
      }
      .log-container::-webkit-scrollbar {
        width: 8px;
      }
      .log-container::-webkit-scrollbar-track {
        background: #1a1a1a;
      }
      .log-container::-webkit-scrollbar-thumb {
        background: #333;
        border-radius: 4px;
      }
      .log-line {
        backface-visibility: hidden;
      }
      .e { color: #ef4444; }
      .w { color: #f59e0b; }
      .i { color: #60a5fa; }
      .status-bar {
        margin-top: 10px;
        color: #9ca3af;
        font-size: 11px;
        display: flex;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 10px;
      }
      .status-item {
        display: flex;
        align-items: center;
        gap: 5px;
      }
      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #6b7280;
      }
      .status-dot.running { background: #22c55e; }
      .status-dot.stopped { background: #6b7280; }
      .status-dot.starting { background: #f59e0b; animation: pulse 1s infinite; }
      .status-dot.failed { background: #ef4444; }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
      .auto-scroll {
        display: flex;
        align-items: center;
        gap: 5px;
        cursor: pointer;
      }
      .auto-scroll input {
        accent-color: #6366f1;
      }
    </style>
  </head>
  <body>
    <div class="toolbar">
      <button class="btn" onclick="refreshLog()">刷新日志</button>
      <button class="btn btn-secondary" onclick="clearLog()">清空日志</button>
      <button class="btn btn-secondary" onclick="saveLog()">保存日志</button>
      <button class="btn btn-secondary" onclick="window.close()">关闭</button>
      <label class="auto-scroll">
        <input type="checkbox" id="autoScroll" checked />
        自动滚动
      </label>
    </div>
    <div class="log-container" id="log-content"></div>
    <div class="status-bar">
      <div class="status-item">
        <div class="status-dot" id="status-dot"></div>
        <span id="status-text">状态：加载中...</span>
      </div>
      <div class="status-item">
        <span>端口：<span id="port-text">-</span></span>
      </div>
      <div class="status-item">
        <span>PID：<span id="pid-text">-</span></span>
      </div>
      <div class="status-item">
        <span>最后更新：<span id="update-time">-</span></span>
      </div>
    </div>

    <script>
      const logContent = document.getElementById('log-content');
      const statusDot = document.getElementById('status-dot');
      const statusText = document.getElementById('status-text');
      const portText = document.getElementById('port-text');
      const pidText = document.getElementById('pid-text');
      const updateTime = document.getElementById('update-time');
      const autoScrollCheckbox = document.getElementById('autoScroll');

      const MAX_LINES = 2000;
      const TRIM_LINES = 500;
      const RENDER_SKIP_FRAMES = 2;
      let pendingText = '';
      let rafId = null;
      let isPageVisible = !document.hidden;
      let lineCount = 0;
      let frameCount = 0;
      let userScrolledUp = false;

      const LEVEL_TEXT = { error: '错误', warn: '警告', info: '信息' };
      const LEVEL_CLASS = { error: 'e', warn: 'w', info: 'i' };

      logContent.addEventListener('scroll', () => {
        const { scrollTop, scrollHeight, clientHeight } = logContent;
        userScrolledUp = scrollTop + clientHeight < scrollHeight - 50;
      });

      function formatLineToHtml(line) {
        const match = line.match(/^\[(\d{2}:\d{2}:\d{2})\] \[(error|warn|info)\] (.*)$/);
        let ts, lvl, msg;
        if (match) {
          ts = match[1]; lvl = match[2]; msg = match[3];
        } else {
          const sm = line.match(/^\[(\d{2}:\d{2}:\d{2})\] (.*)$/);
          if (sm) { ts = sm[1]; lvl = 'info'; msg = sm[2]; }
          else { ts = ''; lvl = 'info'; msg = line; }
        }
        const cls = LEVEL_CLASS[lvl] || 'i';
        const lt = LEVEL_TEXT[lvl] || '信息';
        const escaped = msg.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        return '<span class="' + cls + '">[' + ts + '] [' + lt + '] ' + escaped + '</span>';
      }

      function appendIncremental(text) {
        const lines = text.split('\n');
        const fragment = document.createDocumentFragment();
        let count = 0;
        for (const line of lines) {
          if (!line.trim()) continue;
          const div = document.createElement('div');
          div.className = 'log-line';
          div.innerHTML = formatLineToHtml(line);
          fragment.appendChild(div);
          count++;
        }
        if (count > 0) {
          logContent.appendChild(fragment);
          lineCount += count;
          trimOldLines();
        }
      }

      function trimOldLines() {
        if (lineCount <= MAX_LINES) return;
        const removeCount = lineCount - MAX_LINES + TRIM_LINES;
        for (let i = 0; i < removeCount && logContent.firstChild; i++) {
          logContent.removeChild(logContent.firstChild);
        }
        lineCount = Math.max(0, lineCount - removeCount);
      }

      function scheduleRender() {
        if (rafId) return;
        rafId = requestAnimationFrame(doRender);
      }

      function doRender() {
        rafId = null;

        if (!isPageVisible) {
          if (pendingText) scheduleRender();
          return;
        }

        frameCount++;
        if (frameCount % RENDER_SKIP_FRAMES !== 0 && pendingText.length < 64 * 1024) {
          scheduleRender();
          return;
        }

        if (!pendingText) return;

        const batch = pendingText;
        pendingText = '';
        appendIncremental(batch);

        if (autoScrollCheckbox.checked && !userScrolledUp) {
          logContent.scrollTop = logContent.scrollHeight;
        }

        if (pendingText) {
          scheduleRender();
        }
      }

      function onLogUpdate(data) {
        pendingText += data;

        if (pendingText.length > 128 * 1024) {
          const lines = pendingText.split('\n');
          const keep = lines.slice(-Math.floor(MAX_LINES * 0.5));
          pendingText = keep.join('\n');
        }

        scheduleRender();
        updateTime.textContent = new Date().toLocaleTimeString();
      }

      document.addEventListener('visibilitychange', () => {
        isPageVisible = !document.hidden;
        if (isPageVisible && pendingText) {
          scheduleRender();
        }
      });

      window.addEventListener('DOMContentLoaded', async () => {
        if (window.comfyuiDesktop && window.comfyuiDesktop.getSessionLog) {
          try {
            const cache = await window.comfyuiDesktop.getSessionLog();
            if (cache) {
              const lines = cache.split('\n').filter(l => l.trim());
              const maxInit = 300;
              const start = Math.max(0, lines.length - maxInit);
              if (start > 0) {
                const div = document.createElement('div');
                div.className = 'log-line';
                div.innerHTML = '<span class="i">... 跳过前 ' + start + ' 行 ...</span>';
                logContent.appendChild(div);
              }
              const display = lines.slice(start).join('\n');
              appendIncremental(display);
              logContent.scrollTop = logContent.scrollHeight;
            } else {
              appendPlaceholder();
            }
          } catch {
            appendPlaceholder();
          }
        } else {
          appendPlaceholder();
        }

        if (window.electronAPI) {
          window.electronAPI.on('logUpdate', (_, data) => {
            onLogUpdate(data);
          });
          window.electronAPI.on('statusUpdate', (_, data) => {
            updateStatus(data);
          });
        }
      });

      function appendPlaceholder() {
        const div = document.createElement('div');
        div.className = 'log-line';
        div.innerHTML = '<span class="i">日志窗口已打开，等待新日志...</span>';
        logContent.appendChild(div);
      }

      async function refreshLog() {
        try {
          const content = await window.comfyuiDesktop.getLogContent();
          logContent.innerHTML = '';
          lineCount = 0;
          appendIncremental(content);
          updateTime.textContent = new Date().toLocaleTimeString();
        } catch (err) {
          logContent.textContent = '加载日志失败：' + err.message;
        }
      }

      async function clearLog() {
        const result = await window.comfyuiDesktop.clearLog();
        if (result) {
          logContent.innerHTML = '';
          lineCount = 0;
          pendingText = '';
          const div = document.createElement('div');
          div.className = 'log-line';
          div.innerHTML = '<span class="i">日志已清空</span>';
          logContent.appendChild(div);
          updateTime.textContent = new Date().toLocaleTimeString();
        }
      }

      function saveLog() {
        const content = logContent.innerText;
        const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'comfyui-log-' + new Date().toISOString().slice(0, 10) + '.log';
        a.click();
        URL.revokeObjectURL(url);
      }

      function updateStatus(data) {
        const statusMap = {
          stopped: '已停止', starting: '启动中', running: '运行中',
          failed: '启动失败', restarting: '重启中', stopping: '停止中'
        };
        statusText.textContent = '状态：' + (statusMap[data.status] || data.status);
        statusDot.className = 'status-dot ' + data.status;
        portText.textContent = data.port || '-';
        pidText.textContent = data.pid || '-';
        updateTime.textContent = new Date().toLocaleTimeString();
      }
    </script>
  </body>
</html>
