<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ComfyUI 实时日志</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #1a1a1a;
        color: #fff;
        font-family: Consolas, 'Courier New', monospace;
        font-size: 12px;
        padding: 10px;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }
      .toolbar {
        display: flex;
        gap: 10px;
        margin-bottom: 10px;
        padding-bottom: 10px;
        border-bottom: 1px solid #333;
        flex-wrap: wrap;
      }
      .btn {
        padding: 6px 12px;
        border: none;
        border-radius: 4px;
        background: #6366f1;
        color: #fff;
        cursor: pointer;
        font-size: 12px;
        transition: background 0.3s;
      }
      .btn:hover {
        background: #4f46e5;
      }
      .btn-secondary {
        background: #4b5563;
      }
      .btn-secondary:hover {
        background: #374151;
      }
      .log-container {
        flex: 1;
        overflow-y: auto;
        white-space: pre-wrap;
        line-height: 1.5;
        background: #0f0f0f;
        padding: 10px;
        border-radius: 4px;
        font-size: 11px;
        contain: content;
      }
      .log-container::-webkit-scrollbar {
        width: 8px;
      }
      .log-container::-webkit-scrollbar-track {
        background: #1a1a1a;
      }
      .log-container::-webkit-scrollbar-thumb {
        background: #333;
        border-radius: 4px;
      }
      .log-container .e { color: #ef4444; }
      .log-container .w { color: #f59e0b; }
      .log-container .i { color: #60a5fa; }
      .status-bar {
        margin-top: 10px;
        color: #9ca3af;
        font-size: 11px;
        display: flex;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 10px;
      }
      .status-item {
        display: flex;
        align-items: center;
        gap: 5px;
      }
      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #6b7280;
      }
      .status-dot.running {
        background: #22c55e;
      }
      .status-dot.stopped {
        background: #6b7280;
      }
      .status-dot.starting {
        background: #f59e0b;
        animation: pulse 1s infinite;
      }
      .status-dot.failed {
        background: #ef4444;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }
      .auto-scroll {
        display: flex;
        align-items: center;
        gap: 5px;
        cursor: pointer;
      }
      .auto-scroll input {
        accent-color: #6366f1;
      }
    </style>
  </head>
  <body>
    <div class="toolbar">
      <button class="btn" onclick="refreshLog()">刷新日志</button>
      <button class="btn btn-secondary" onclick="clearLog()">清空日志</button>
      <button class="btn btn-secondary" onclick="saveLog()">保存日志</button>
      <button class="btn btn-secondary" onclick="window.close()">关闭</button>
      <label class="auto-scroll">
        <input type="checkbox" id="autoScroll" checked />
        自动滚动
      </label>
    </div>
    <div class="log-container" id="log-content"></div>
    <div class="status-bar">
      <div class="status-item">
        <div class="status-dot" id="status-dot"></div>
        <span id="status-text">状态：加载中...</span>
      </div>
      <div class="status-item">
        <span>端口：<span id="port-text">-</span></span>
      </div>
      <div class="status-item">
        <span>PID：<span id="pid-text">-</span></span>
      </div>
      <div class="status-item">
        <span>最后更新：<span id="update-time">-</span></span>
      </div>
    </div>

    <script>
      const logContent = document.getElementById('log-content');
      const statusDot = document.getElementById('status-dot');
      const statusText = document.getElementById('status-text');
      const portText = document.getElementById('port-text');
      const pidText = document.getElementById('pid-text');
      const updateTime = document.getElementById('update-time');
      const autoScrollCheckbox = document.getElementById('autoScroll');

      const MAX_CHARS = 200 * 1024;
      let logText = '';
      let renderTimer = null;
      let isDirty = false;
      let lineCount = 0;
      const MAX_LINES = 3000;
      const IPC_THROTTLE_MS = 200;

      const LEVEL_TEXT = { error: '错误', warn: '警告', info: '信息' };
      const LEVEL_CLASS = { error: 'e', warn: 'w', info: 'i' };

      function parseAndFormat(text) {
        const lines = text.split('\n');
        let html = '';
        for (const line of lines) {
          if (!line.trim()) continue;
          const match = line.match(/^\[(\d{2}:\d{2}:\d{2})\] \[(error|warn|info)\] (.*)$/);
          let ts, lvl, msg, cls;
          if (match) {
            ts = match[1]; lvl = match[2]; msg = match[3];
          } else {
            const sm = line.match(/^\[(\d{2}:\d{2}:\d{2})\] (.*)$/);
            if (sm) { ts = sm[1]; lvl = 'info'; msg = sm[2]; }
            else { ts = ''; lvl = 'info'; msg = line; }
          }
          cls = LEVEL_CLASS[lvl] || 'i';
          const lt = LEVEL_TEXT[lvl] || '信息';
          const escaped = msg.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
          html += '<span class="' + cls + '">[' + ts + '] [' + lt + '] ' + escaped + '</span>\n';
        }
        return html;
      }

      function appendLogData(text) {
        const newLines = text.split('\n').filter(l => l.trim()).length;
        lineCount += newLines;

        if (lineCount > MAX_LINES) {
          const allLines = (logText + text).split('\n');
          const keep = allLines.slice(-MAX_LINES);
          logText = keep.join('\n');
          lineCount = MAX_LINES;
        } else {
          logText += text;
        }

        if (logText.length > MAX_CHARS) {
          logText = logText.slice(-Math.floor(MAX_CHARS * 0.8));
        }

        if (!renderTimer) {
          isDirty = true;
          renderTimer = setTimeout(flushRender, IPC_THROTTLE_MS);
        } else {
          isDirty = true;
        }
      }

      function flushRender() {
        renderTimer = null;
        if (!isDirty) return;
        isDirty = false;
        logContent.innerHTML = parseAndFormat(logText);
        if (autoScrollCheckbox.checked) {
          logContent.scrollTop = logContent.scrollHeight;
        }
      }

      window.addEventListener('DOMContentLoaded', async () => {
        if (window.comfyuiDesktop && window.comfyuiDesktop.getSessionLog) {
          try {
            const sessionLogCache = await window.comfyuiDesktop.getSessionLog();
            if (sessionLogCache) {
              const lines = sessionLogCache.split('\n').filter(l => l.trim());
              const maxInitial = 500;
              const startIdx = Math.max(0, lines.length - maxInitial);
              const display = lines.slice(startIdx).join('\n');
              lineCount = lines.slice(startIdx).length;
              logText = display + '\n';
              logContent.innerHTML = parseAndFormat(logText);
              logContent.scrollTop = logContent.scrollHeight;
            } else {
              appendPlaceholder();
            }
          } catch {
            appendPlaceholder();
          }
        } else {
          appendPlaceholder();
        }

        if (window.electronAPI) {
          window.electronAPI.on('logUpdate', (_, data) => {
            appendLogData(data);
            updateTime.textContent = new Date().toLocaleTimeString();
          });

          window.electronAPI.on('statusUpdate', (_, data) => {
            updateStatus(data);
          });
        }
      });

      function appendPlaceholder() {
        logContent.innerHTML = '<span class="i">日志窗口已打开，等待新日志...</span>';
      }

      async function refreshLog() {
        try {
          const content = await window.comfyuiDesktop.getLogContent();
          logText = content;
          lineCount = content.split('\n').filter(l => l.trim()).length;
          logContent.innerHTML = parseAndFormat(content);
          updateTime.textContent = new Date().toLocaleTimeString();
        } catch (err) {
          logContent.textContent = '加载日志失败：' + err.message;
        }
      }

      async function clearLog() {
        const result = await window.comfyuiDesktop.clearLog();
        if (result) {
          logText = '';
          lineCount = 0;
          logContent.innerHTML = '<span class="i">日志已清空</span>';
          updateTime.textContent = new Date().toLocaleTimeString();
        }
      }

      function saveLog() {
        const content = logContent.innerText;
        const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'comfyui-log-' + new Date().toISOString().slice(0, 10) + '.log';
        a.click();
        URL.revokeObjectURL(url);
      }

      function updateStatus(data) {
        const statusMap = {
          stopped: '已停止',
          starting: '启动中',
          running: '运行中',
          failed: '启动失败',
          restarting: '重启中',
          stopping: '停止中'
        };

        statusText.textContent = '状态：' + (statusMap[data.status] || data.status);
        statusDot.className = 'status-dot ' + data.status;
        portText.textContent = data.port || '-';
        pidText.textContent = data.pid || '-';
        updateTime.textContent = new Date().toLocaleTimeString();
      }
    </script>
  </body>
</html>
