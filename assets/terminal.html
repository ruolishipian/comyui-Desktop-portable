<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ComfyUI 终端</title>
    <link rel="stylesheet" href="/shell/assets/xterm/xterm.css" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #1a1a1a;
        color: #fff;
        font-family: Consolas, 'Courier New', monospace;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }
      .toolbar {
        display: flex;
        gap: 8px;
        padding: 6px 10px;
        background: #2d2d2d;
        border-bottom: 1px solid #404040;
        align-items: center;
      }
      .btn {
        padding: 4px 10px;
        border: none;
        border-radius: 3px;
        background: #4b5563;
        color: #e0e0e0;
        cursor: pointer;
        font-size: 11px;
      }
      .btn:hover { background: #6366f1; }
      .terminal-container {
        flex: 1;
        padding: 4px;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div class="toolbar">
      <button class="btn" id="btn-new">新建终端</button>
      <button class="btn" id="btn-kill">终止当前</button>
      <button class="btn" id="btn-clear">清屏</button>
    </div>
    <div class="terminal-container" id="terminal"></div>

    <script type="module">
      import { Terminal } from '/shell/assets/xterm/xterm.mjs';
      import { FitAddon } from '/shell/assets/xterm/xterm-addon-fit.mjs';

      const container = document.getElementById('terminal');
      const term = new Terminal({
        theme: {
          background: '#1a1a1a',
          foreground: '#e0e0e0',
          cursor: '#6366f1',
          selectionBackground: 'rgba(99,102,241,0.3)'
        },
        fontSize: 13,
        fontFamily: 'Consolas, Courier New, monospace',
        cursorBlink: true,
        scrollback: 5000
      });

      const fitAddon = new FitAddon();
      term.loadAddon(fitAddon);
      term.open(container);
      fitAddon.fit();

      let currentSessionId = null;

      if (window.electronAPI) {
        window.electronAPI.on('terminal:data', (_, sessionId, data) => {
          if (sessionId === currentSessionId) {
            term.write(data);
          }
        });

        window.electronAPI.on('terminal:exit', (_, sessionId, exitCode) => {
          if (sessionId === currentSessionId) {
            term.write('\r\n\x1b[33m[进程已退出，代码: ' + exitCode + ']\x1b[0m\r\n');
          }
        });
      }

      term.onData((data) => {
        if (currentSessionId !== null && window.comfyuiDesktop) {
          window.comfyuiDesktop.terminalWrite(currentSessionId, data);
        }
      });

      window.addEventListener('resize', () => {
        fitAddon.fit();
        if (currentSessionId !== null && window.comfyuiDesktop) {
          window.comfyuiDesktop.terminalResize(currentSessionId, term.cols, term.rows);
        }
      });

      document.getElementById('btn-new').addEventListener('click', () => {
        if (window.comfyuiDesktop && window.comfyuiDesktop.terminalCreate) {
          window.comfyuiDesktop.terminalCreate(term.cols, term.rows).then((sessionId) => {
            if (sessionId !== null) {
              currentSessionId = sessionId;
              term.clear();
              term.focus();
            }
          });
        }
      });

      document.getElementById('btn-kill').addEventListener('click', () => {
        if (currentSessionId !== null && window.comfyuiDesktop) {
          window.comfyuiDesktop.terminalKill(currentSessionId);
          currentSessionId = null;
          term.write('\r\n\x1b[33m[终端已终止]\x1b[0m\r\n');
        }
      });

      document.getElementById('btn-clear').addEventListener('click', () => {
        term.clear();
      });

      // 自动创建一个终端会话
      setTimeout(() => {
        document.getElementById('btn-new').click();
      }, 500);
    </script>
  </body>
</html>
