name: Electron 极简构建 & 双版本发布

permissions:
  contents: write

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'

      - name: 安装依赖（使用国内镜像）
        run: |
          npm config set registry https://registry.npmmirror.com
          npm install
        shell: pwsh

      - name: 清理electron-builder缓存
        run: |
          Remove-Item -Recurse -Force $env:LOCALAPPDATA\electron-builder\Cache -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force node_modules\.cache\electron-builder -ErrorAction SilentlyContinue
        shell: pwsh
        continue-on-error: true

      - name: 构建项目
        run: npm run build
        shell: pwsh

      - name: 打包 (仅安装包+压缩包)
        run: |
          npx electron-builder --win --x64 --publish never
        shell: pwsh

      - name: 上传到 Releases
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/*.exe
            dist/*.zip
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 上传到 Artifacts (备用)
        uses: actions/upload-artifact@v4
        with:
          name: ComfyUI_Electron-Core
          path: |
            dist/*.exe
            dist/*.zip
          retention-days: 30