# Electron Builder 配置文件
# 用于生成安装包和压缩包

appId: com.comfyui.portable-desktop
productName: ComfyUI-Desktop-portable
copyright: Copyright © 2024 ComfyUI Community

# 目录配置
directories:
  output: dist
  buildResources: assets

# 文件包含配置
files:
  - dist/**/*
  - assets/**/*
  - node_modules/**/*
  - package.json
  - "!**/*.map"
  - "!**/*.ts"
  - "!test/**/*"
  - "!docs/**/*"
  - "!.vscode/**/*"
  - "!.github/**/*"
  - "!dist/*.zip"
  - "!dist/*.exe"
  - "!dist/*.blockmap"
  - "!dist/builder-*.yml"

# ASAR 打包配置
asar: true
asarUnpack:
  - "**/*.node"

# Windows 配置
win:
  icon: assets/icon.ico
  target:
    - target: nsis
      arch:
        - x64
    - target: zip
      arch:
        - x64
  artifactName: ${productName}-${version}-${arch}.${ext}

# NSIS 安装包配置
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  allowElevation: true
  # 快捷方式配置 - 确保图标正确关联
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: ComfyUI-Desktop-portable
  deleteAppDataOnUninstall: false
  # 图标配置 - 确保路径正确
  # 注意: 移除 uninstallerIcon 和 installerHeaderIcon 配置
  # 原因: 当定义 UNINSTALLER_ICON 时，electron-builder 的 NSIS 模板会将
  # 注册表 DisplayIcon 指向 uninstallerIcon.ico 而非应用程序 EXE，
  # 导致 Windows 控制面板/设置中显示的是卸载程序图标而非应用图标
  installerIcon: assets/icon.ico
  # uninstallerIcon: assets/icon.ico
  # installerHeaderIcon: assets/icon.ico
  # 语言选择器配置
  displayLanguageSelector: true
  installerLanguages:
    - zh_CN
    - en_US
  language: "2052"  # 简体中文 (默认语言)
  # 注意: multiLanguageInstaller 已移除,避免重复语言选择
  artifactName: ${productName}-${version}-setup.${ext}
  # 安装前执行的脚本 - 备份配置文件、验证图标、刷新缓存
  include: "scripts/installer.nsh"

# 语言过滤 - 只保留中文和英文
electronLanguages:
  - zh-CN
  - zh-TW
  - en-US

# 额外资源
extraResources:
  - from: assets
    to: assets
    filter:
      - "**/*"

# 打包后钩子 - 过滤语言文件
afterPack: ./scripts/filter-languages-hook.js

# 发布配置
publish: null
