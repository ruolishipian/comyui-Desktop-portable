# Electron Builder 配置文件
# 用于生成安装包和压缩包

appId: com.comfyui.portable-desktop
productName: ComfyUI-Desktop-portable
copyright: Copyright © 2024 ComfyUI Community

# 目录配置
directories:
  output: dist
  buildResources: assets

# 文件包含配置
files:
  - dist/**/*
  - assets/**/*
  - node_modules/**/*
  - package.json
  - "!**/*.map"
  - "!**/*.ts"
  - "!test/**/*"
  - "!docs/**/*"
  - "!.vscode/**/*"
  - "!.github/**/*"

# ASAR 打包配置
asar: true
asarUnpack:
  - "**/*.node"

# Windows 配置
win:
  target:
    - target: nsis
      arch:
        - x64
    - target: zip
      arch:
        - x64
  artifactName: ${productName}-${version}-${arch}.${ext}

# NSIS 安装包配置
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  allowElevation: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: ComfyUI Desktop
  deleteAppDataOnUninstall: false
  # 语言选择器配置
  displayLanguageSelector: true
  installerLanguages:
    - zh_CN
    - en_US
  language: "2052"  # 简体中文 (默认语言)
  # 注意: multiLanguageInstaller 已移除,避免重复语言选择
  artifactName: ${productName}-${version}-setup.${ext}

# 语言过滤 - 只保留中文和英文
electronLanguages:
  - zh-CN
  - zh-TW
  - en-US

# 额外资源
extraResources:
  - from: assets
    to: assets
    filter:
      - "**/*"

# 打包后钩子 - 过滤语言文件
afterPack: ./scripts/filter-languages-hook.js

# 发布配置
publish: null
